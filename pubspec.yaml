name: offline_connect
description: "Discover and connect with nearby people offline using BLE."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  flutter_blue_plus: ^1.31.18
  path_provider: ^2.1.2
  flutter_secure_storage: ^9.0.0
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  permission_handler: ^12.0.1
  device_info_plus: ^12.4.0
  url_launcher: ^6.3.2
  firebase_app_check: ^0.3.2+10
  sqflite_sqlcipher: ^3.4.0
  nearby_connections: ^4.3.0
  collection: ^1.19.1
  sensors_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.7+1
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
  assets:
    - assets/avatars/
